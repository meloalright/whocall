name: Showcase

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  showcase:
    name: Run who-ast on samples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Index sample project
        run: |
          cd samples/rust-project
          ../../target/release/who-call index .
          echo ""
          echo "=== metadata ==="
          cat .who-ast/metadata.json

      - name: "Demo: who-call (human)"
        run: |
          cd samples/rust-project
          echo "$ who-call src/text/render.rs:3"
          ../../target/release/who-call src/text/render.rs:3 || true

      - name: "Demo: who-call (JSON)"
        run: |
          cd samples/rust-project
          echo "$ who-call src/text/render.rs:3 --json"
          ../../target/release/who-call src/text/render.rs:3 --json || true

      - name: "Demo: who-impl"
        run: |
          cd samples/rust-project
          echo "$ who-impl src/traits.rs:5"
          ../../target/release/who-impl src/traits.rs:5 || true

      - name: "Edge case: comments should not appear as callers"
        run: |
          cd samples/rust-project
          OUTPUT=$(../../target/release/who-call src/text/render.rs:3 --json || true)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "commented_out_call"; then
            echo "::error::FAIL: commented_out_call appeared as a caller"
            exit 1
          fi
          echo "PASS: commented_out_call correctly excluded"

      - name: "Edge case: same-name fn should not appear as caller"
        run: |
          cd samples/rust-project
          OUTPUT=$(../../target/release/who-call src/text/render.rs:3 --json || true)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "calls_local_render_text"; then
            echo "::error::FAIL: calls_local_render_text appeared as a caller"
            exit 1
          fi
          echo "PASS: calls_local_render_text correctly excluded"
