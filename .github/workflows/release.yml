name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cross build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../who-${{ matrix.target }}.tar.gz who-call who-impl
          cd ../../..

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.event.release.tag_name }} who-${{ matrix.target }}.tar.gz --clobber

  homebrew:
    name: Update Homebrew tap
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Wait for assets
        run: sleep 5

      - name: Download release assets and compute SHA256
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION_NUM="${VERSION#v}"

          for target in aarch64-apple-darwin x86_64-apple-darwin x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu; do
            gh release download "$VERSION" \
              --repo meloalright/who-ast \
              --pattern "who-${target}.tar.gz"
            SHA=$(sha256sum "who-${target}.tar.gz" | cut -d' ' -f1)
            echo "SHA_${target//-/_}=$SHA" >> "$GITHUB_ENV"
          done

          echo "VERSION_NUM=$VERSION_NUM" >> "$GITHUB_ENV"
          echo "VERSION_TAG=$VERSION" >> "$GITHUB_ENV"

      - name: Generate formulas
        run: |
          for entry in "ast-call:AstCall:who-call:Semantic code intelligence — find callers of a symbol" "ast-impl:AstImpl:who-impl:Semantic code intelligence — find implementations of traits and interfaces"; do
            IFS=':' read -r FORMULA_NAME CLASS_NAME BIN_NAME DESC <<< "$entry"
            cat > "${FORMULA_NAME}.rb" << FORMULA
          class ${CLASS_NAME} < Formula
            desc "${DESC}"
            homepage "https://github.com/meloalright/who-ast"
            version "${VERSION_NUM}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/meloalright/who-ast/releases/download/${VERSION_TAG}/who-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_aarch64_apple_darwin}"
              else
                url "https://github.com/meloalright/who-ast/releases/download/${VERSION_TAG}/who-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_x86_64_apple_darwin}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/meloalright/who-ast/releases/download/${VERSION_TAG}/who-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_aarch64_unknown_linux_gnu}"
              else
                url "https://github.com/meloalright/who-ast/releases/download/${VERSION_TAG}/who-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_x86_64_unknown_linux_gnu}"
              end
            end

            def install
              bin.install "${BIN_NAME}"
            end

            test do
              assert_match "${BIN_NAME}", shell_output("#{bin}/${BIN_NAME} --version")
            end
          end
          FORMULA
            echo "=== ${FORMULA_NAME}.rb ==="
            cat "${FORMULA_NAME}.rb"
          done

      - name: Push to homebrew-tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          git clone https://x-access-token:${TAP_TOKEN}@github.com/meloalright/homebrew-tap.git tap
          mkdir -p tap/Formula
          cp ast-call.rb tap/Formula/ast-call.rb
          cp ast-impl.rb tap/Formula/ast-impl.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ast-call.rb Formula/ast-impl.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update ast-call and ast-impl to $VERSION_NUM"
          git push
