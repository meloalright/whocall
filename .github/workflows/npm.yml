name: npm publish

on:
  release:
    types: [published]

jobs:
  npm:
    name: Publish to npm
    needs: []
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Wait for release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          echo "Waiting for release assets to be available..."
          for i in $(seq 1 30); do
            ASSETS=$(gh release view "$VERSION" --repo ${{ github.repository }} --json assets -q '.assets | length')
            if [ "$ASSETS" -ge 4 ]; then
              echo "All 4 assets available"
              break
            fi
            echo "Found $ASSETS assets, waiting... ($i/30)"
            sleep 10
          done

      - name: Update versions
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION_NUM="${VERSION#v}"

          for pkg in whocall whoimpl; do
            cd npm/$pkg
            node -e "
              const pkg = require('./package.json');
              pkg.version = '${VERSION_NUM}';
              require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            "
            echo "=== $pkg package.json ==="
            cat package.json
            cd ../..
          done

      - name: Publish whocall
        working-directory: npm/whocall
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Publish whoimpl
        working-directory: npm/whoimpl
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
