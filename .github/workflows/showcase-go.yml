name: "Showcase: Go"

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  showcase-go:
    name: Run who-ast on Go samples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Index sample project
        run: |
          cd samples/go-project
          ../../target/release/whocall index .
          echo ""
          echo "=== metadata ==="
          cat .who-ast/metadata.json

      - name: "Demo: whocall (human)"
        run: |
          cd samples/go-project
          echo "$ whocall pkg/utils.go:5"
          ../../target/release/whocall pkg/utils.go:5 || true

      - name: "Demo: whocall (JSON)"
        run: |
          cd samples/go-project
          echo "$ whocall pkg/utils.go:5 --json"
          ../../target/release/whocall pkg/utils.go:5 --json || true

      - name: "Demo: whocall file#symbol"
        run: |
          cd samples/go-project
          echo "$ whocall pkg/utils.go#FormatOutput"
          ../../target/release/whocall pkg/utils.go#FormatOutput || true

      - name: "Demo: whocall cross-file"
        run: |
          cd samples/go-project
          echo "$ whocall pkg/utils.go#RenderText"
          ../../target/release/whocall pkg/utils.go#RenderText || true

      - name: "Demo: whoimpl (human)"
        run: |
          cd samples/go-project
          echo "$ whoimpl pkg/animal.go:4"
          ../../target/release/whoimpl pkg/animal.go:4 || true

      - name: "Demo: whoimpl (JSON)"
        run: |
          cd samples/go-project
          echo "$ whoimpl pkg/animal.go:4 --json"
          ../../target/release/whoimpl pkg/animal.go:4 --json || true
