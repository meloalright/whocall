name: "Showcase: Python"

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  showcase-python:
    name: Run who-ast on Python samples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Index sample project
        run: |
          cd samples/python-project
          ../../target/release/whocall index .
          echo ""
          echo "=== metadata ==="
          cat .who-ast/metadata.json

      - name: "Demo: whocall (human)"
        run: |
          cd samples/python-project
          echo "$ whocall src/utils.py:1"
          ../../target/release/whocall src/utils.py:1 || true

      - name: "Demo: whocall (JSON)"
        run: |
          cd samples/python-project
          echo "$ whocall src/utils.py:1 --json"
          ../../target/release/whocall src/utils.py:1 --json || true

      - name: "Demo: whocall class method"
        run: |
          cd samples/python-project
          echo "$ whocall src/models.py#greet"
          ../../target/release/whocall src/models.py#greet || true

      - name: "Demo: whoimpl (human)"
        run: |
          cd samples/python-project
          echo "$ whoimpl src/models.py:5"
          ../../target/release/whoimpl src/models.py:5 || true

      - name: "Demo: whoimpl (JSON)"
        run: |
          cd samples/python-project
          echo "$ whoimpl src/models.py:5 --json"
          ../../target/release/whoimpl src/models.py:5 --json || true

      - name: "Demo: whoimpl file#symbol"
        run: |
          cd samples/python-project
          echo "$ whoimpl src/models.py#greet"
          ../../target/release/whoimpl src/models.py#greet || true

      - name: "Edge case: comments should not appear as callers"
        run: |
          cd samples/python-project
          OUTPUT=$(../../target/release/whocall src/utils.py:1 --json || true)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "commented_out_call"; then
            echo "::error::FAIL: commented_out_call appeared as a caller"
            exit 1
          fi
          echo "PASS: commented_out_call correctly excluded"

      - name: "Edge case: same-name fn should not appear as caller"
        run: |
          cd samples/python-project
          OUTPUT=$(../../target/release/whocall src/utils.py:1 --json || true)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "calls_local_render_text"; then
            echo "::error::FAIL: calls_local_render_text appeared as a caller"
            exit 1
          fi
          echo "PASS: calls_local_render_text correctly excluded"
