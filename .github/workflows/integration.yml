name: Integration Test

on:
  workflow_dispatch:

jobs:
  test-brew-macos:
    name: "Homebrew (macOS)"
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install via Homebrew
        run: |
          brew install meloalright/tap/whocall
          brew install meloalright/tap/whoimpl

      - name: "whocall -h"
        run: whocall -h

      - name: "whoimpl -h"
        run: whoimpl -h

      - name: "whocall: index Rust sample"
        run: |
          cd samples/rust-project
          whocall index .
          cat .who-ast/metadata.json

      - name: "whocall: file:line (Rust)"
        run: |
          cd samples/rust-project
          whocall src/text/render.rs:3

      - name: "whocall: file#symbol (Rust)"
        run: |
          cd samples/rust-project
          whocall src/text/render.rs#render_text

      - name: "whocall: JSON output (Rust)"
        run: |
          cd samples/rust-project
          whocall src/text/render.rs:3 --json

      - name: "whoimpl: file:line (Rust)"
        run: |
          cd samples/rust-project
          whoimpl src/base_trait.rs:4

      - name: "whoimpl: file#symbol (Rust)"
        run: |
          cd samples/rust-project
          whoimpl src/base_trait.rs#render

      - name: "whoimpl: JSON output (Rust)"
        run: |
          cd samples/rust-project
          whoimpl src/base_trait.rs:4 --json

      - name: "whocall: index Python sample"
        run: |
          cd samples/python-project
          whocall index .
          cat .who-ast/metadata.json

      - name: "whocall: file:line (Python)"
        run: |
          cd samples/python-project
          whocall src/utils.py:1

      - name: "whocall: file#symbol (Python)"
        run: |
          cd samples/python-project
          whocall src/utils.py#format_output

      - name: "whoimpl: file:line (Python)"
        run: |
          cd samples/python-project
          whoimpl src/models.py:5

      - name: "whoimpl: file#symbol (Python)"
        run: |
          cd samples/python-project
          whoimpl src/base.py#speak

  test-brew-linux:
    name: "Homebrew (Linux)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Homebrew
        run: |
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          echo >> $GITHUB_ENV "PATH=/home/linuxbrew/.linuxbrew/bin:$PATH"

      - name: Install via Homebrew
        run: |
          export PATH="/home/linuxbrew/.linuxbrew/bin:$PATH"
          brew install meloalright/tap/whocall
          brew install meloalright/tap/whoimpl

      - name: "whocall -h"
        run: |
          export PATH="/home/linuxbrew/.linuxbrew/bin:$PATH"
          whocall -h

      - name: "whoimpl -h"
        run: |
          export PATH="/home/linuxbrew/.linuxbrew/bin:$PATH"
          whoimpl -h

      - name: "whocall: index + query Rust sample"
        run: |
          export PATH="/home/linuxbrew/.linuxbrew/bin:$PATH"
          cd samples/rust-project
          whocall index .
          whocall src/text/render.rs:3
          whocall src/text/render.rs#render_text
          whoimpl src/base_trait.rs:4
          whoimpl src/base_trait.rs#render

      - name: "whocall: index + query Python sample"
        run: |
          export PATH="/home/linuxbrew/.linuxbrew/bin:$PATH"
          cd samples/python-project
          whocall index .
          whocall src/utils.py:1
          whocall src/utils.py#format_output
          whoimpl src/models.py:5
          whoimpl src/base.py#speak

  test-npm-macos:
    name: "npm (macOS)"
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install via npm
        run: |
          npm install -g @whocall/cli
          npm install -g @whoimpl/cli

      - name: "whocall -h"
        run: whocall -h

      - name: "whoimpl -h"
        run: whoimpl -h

      - name: "whocall: index + query Rust sample"
        run: |
          cd samples/rust-project
          whocall index .
          whocall src/text/render.rs:3
          whocall src/text/render.rs#render_text
          whocall src/text/render.rs:3 --json
          whoimpl src/base_trait.rs:4
          whoimpl src/base_trait.rs#render
          whoimpl src/base_trait.rs:4 --json

      - name: "whocall: index + query Python sample"
        run: |
          cd samples/python-project
          whocall index .
          whocall src/utils.py:1
          whocall src/utils.py#format_output
          whoimpl src/models.py:5
          whoimpl src/base.py#speak

  test-npm-linux:
    name: "npm (Linux)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install via npm
        run: |
          npm install -g @whocall/cli
          npm install -g @whoimpl/cli

      - name: "whocall -h"
        run: whocall -h

      - name: "whoimpl -h"
        run: whoimpl -h

      - name: "whocall: index + query Rust sample"
        run: |
          cd samples/rust-project
          whocall index .
          whocall src/text/render.rs:3
          whocall src/text/render.rs#render_text
          whocall src/text/render.rs:3 --json
          whoimpl src/base_trait.rs:4
          whoimpl src/base_trait.rs#render
          whoimpl src/base_trait.rs:4 --json

      - name: "whocall: index + query Python sample"
        run: |
          cd samples/python-project
          whocall index .
          whocall src/utils.py:1
          whocall src/utils.py#format_output
          whoimpl src/models.py:5
          whoimpl src/base.py#speak
