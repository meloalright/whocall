name: Integration Check

on:
  workflow_dispatch:

jobs:
  test-brew-macos:
    name: "Homebrew (macOS)"
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install via Homebrew
        run: |
          brew install meloalright/tap/whocall
          brew install meloalright/tap/whoimpl

      - name: "whocall -V"
        run: whocall -V

      - name: "whoimpl -V"
        run: whoimpl -V

      - name: "whocall -V"
        run: whocall -V

      - name: "whoimpl -V"
        run: whoimpl -V

      - name: "whocall -h"
        run: whocall -h

      - name: "whoimpl -h"
        run: whoimpl -h

      - name: "index + query Rust sample"
        run: |
          cd samples/rust-project
          whocall index .
          whocall src/text/render.rs:3
          whocall src/text/render.rs#render_text
          whocall src/text/render.rs:3 --json
          whoimpl src/base_trait.rs:4
          whoimpl src/base_trait.rs#render
          whoimpl src/base_trait.rs:4 --json

      - name: "index + query Python sample"
        run: |
          cd samples/python-project
          whocall index .
          whocall src/utils.py:6
          whocall src/utils.py#format_output
          whoimpl src/models.py:5
          whoimpl src/base.py#speak

  test-brew-linux:
    name: "Homebrew (Linux)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Homebrew
        run: |
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          echo >> $GITHUB_ENV "PATH=/home/linuxbrew/.linuxbrew/bin:$PATH"

      - name: Install via Homebrew
        run: |
          export PATH="/home/linuxbrew/.linuxbrew/bin:$PATH"
          brew install meloalright/tap/whocall
          brew install meloalright/tap/whoimpl

      - name: "whocall -V"
        run: |
          export PATH="/home/linuxbrew/.linuxbrew/bin:$PATH"
          whocall -V

      - name: "whoimpl -V"
        run: |
          export PATH="/home/linuxbrew/.linuxbrew/bin:$PATH"
          whoimpl -V

      - name: "whocall -h"
        run: |
          export PATH="/home/linuxbrew/.linuxbrew/bin:$PATH"
          whocall -h

      - name: "whoimpl -h"
        run: |
          export PATH="/home/linuxbrew/.linuxbrew/bin:$PATH"
          whoimpl -h

      - name: "index + query Rust sample"
        run: |
          export PATH="/home/linuxbrew/.linuxbrew/bin:$PATH"
          cd samples/rust-project
          whocall index .
          whocall src/text/render.rs:3
          whocall src/text/render.rs#render_text
          whocall src/text/render.rs:3 --json
          whoimpl src/base_trait.rs:4
          whoimpl src/base_trait.rs#render
          whoimpl src/base_trait.rs:4 --json

      - name: "index + query Python sample"
        run: |
          export PATH="/home/linuxbrew/.linuxbrew/bin:$PATH"
          cd samples/python-project
          whocall index .
          whocall src/utils.py:6
          whocall src/utils.py#format_output
          whoimpl src/models.py:5
          whoimpl src/base.py#speak

  test-npm-macos:
    name: "npm (macOS)"
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install via npm
        run: |
          npm install -g @whocall/cli
          npm install -g @whoimpl/cli

      - name: "whocall -V"
        run: whocall -V

      - name: "whoimpl -V"
        run: whoimpl -V

      - name: "whocall -V"
        run: whocall -V

      - name: "whoimpl -V"
        run: whoimpl -V

      - name: "whocall -h"
        run: whocall -h

      - name: "whoimpl -h"
        run: whoimpl -h

      - name: "index + query Rust sample"
        run: |
          cd samples/rust-project
          whocall index .
          whocall src/text/render.rs:3
          whocall src/text/render.rs#render_text
          whocall src/text/render.rs:3 --json
          whoimpl src/base_trait.rs:4
          whoimpl src/base_trait.rs#render
          whoimpl src/base_trait.rs:4 --json

      - name: "index + query Python sample"
        run: |
          cd samples/python-project
          whocall index .
          whocall src/utils.py:6
          whocall src/utils.py#format_output
          whoimpl src/models.py:5
          whoimpl src/base.py#speak

  test-npm-linux:
    name: "npm (Linux)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install via npm
        run: |
          npm install -g @whocall/cli
          npm install -g @whoimpl/cli

      - name: "whocall -V"
        run: whocall -V

      - name: "whoimpl -V"
        run: whoimpl -V

      - name: "whocall -h"
        run: whocall -h

      - name: "whoimpl -h"
        run: whoimpl -h

      - name: "index + query Rust sample"
        run: |
          cd samples/rust-project
          whocall index .
          whocall src/text/render.rs:3
          whocall src/text/render.rs#render_text
          whocall src/text/render.rs:3 --json
          whoimpl src/base_trait.rs:4
          whoimpl src/base_trait.rs#render
          whoimpl src/base_trait.rs:4 --json

      - name: "index + query Python sample"
        run: |
          cd samples/python-project
          whocall index .
          whocall src/utils.py:6
          whocall src/utils.py#format_output
          whoimpl src/models.py:5
          whoimpl src/base.py#speak
